<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOSS - Global ACP Map</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Prevents mobile scroll bouncing */
            background-color: #050510;
            /* Clean dark fallback */
        }

        #globe {
            width: 100vw;
            height: 100%;
            height: 100svh;
            /* dynamic viewport respects mobile URL bars */
            touch-action: none;
            /* Prevents pull-to-refresh over the canvas */
        }

        .main-title-container {
            position: fixed;
            top: 24px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .main-title {
            margin: 0;
            font-family: 'Inter', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4));
            line-height: 1;
        }

        .main-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #38bdf8;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .pin {
            width: 18px;
            height: 18px;
            background: red;
            border-radius: 50%;
            cursor: pointer;
            z-index: 1;
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
            animation: pulse 1.5s infinite;
            pointer-events: auto;
        }

        .pin.hidden {
            display: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.6);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 0, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
            }
        }

        #popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(25, 25, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            z-index: 40;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            width: 500px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        #popup.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .card-close {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s ease, transform 0.2s ease;
            line-height: 1;
        }

        .card-close:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        .card-content {
            display: flex;
            gap: 20px;
            padding: 24px;
        }

        .card-image-container {
            flex-shrink: 0;
            width: 140px;
            height: 140px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            margin: 0 0 4px 0;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-subtitle {
            margin: 0 0 12px 0;
            font-size: 0.95rem;
            color: #aaa;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-body {
            font-size: 0.9rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
        }

        .card-body p {
            margin: 0 0 16px 0;
        }

        .card-info-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr;
            gap: 8px;
        }

        .card-info-list li {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 4px;
        }

        .card-info-list li:last-child {
            border-bottom: none;
        }

        .card-info-label {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        .card-info-value {
            color: #fff;
            font-weight: 500;
        }

        /* SEARCH CONTAINER */
        #search-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: rgba(25, 25, 30, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
            font-family: 'Inter', sans-serif;
        }

        #search-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            width: 100%;
            background: rgba(25, 25, 30, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
            flex-direction: column;
            max-height: 300px;
            overflow-y: auto;
            overflow-x: hidden;
            box-sizing: border-box;
        }

        #search-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        #search-dropdown::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
            text-align: left;
        }

        .dropdown-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .dropdown-item:last-child {
            border-bottom: none;
        }

        #search-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            padding: 8px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }

        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        #search-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            color: black;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        /* ZOOM CONTROLS */
        #zoom-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(25, 25, 30, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-family: 'Inter', sans-serif;
            color: white;
            font-size: 14px;
        }

        #zoom-reset {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #zoom-reset:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .zoom-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s;
            padding: 0;
        }

        .zoom-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* ============================================
           UNIFIED DRAWER SYSTEM
           ============================================ */

        /* CONTROL BUTTON - DESKTOP HIDDEN, MOBILE VISIBLE */
        #sidebar-floating-toggle {
            position: fixed;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: black;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 20;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sidebar-floating-toggle:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(79, 172, 254, 0.4);
        }

        /* DESKTOP: Hide the button (drawer is always visible) */
        @media (min-width: 768px) {
            #sidebar-floating-toggle {
                display: none;
            }
        }

        /* MOBILE: Show button at bottom center */
        @media (max-width: 767px) {
            #sidebar-floating-toggle {
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: calc(100% - 40px);
                max-width: 300px;
            }
        }

        /* DRAWER OVERLAY BACKDROP */
        #drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 40;
        }

        #drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* MOBILE ONLY: Hide overlay on desktop */
        @media (min-width: 768px) {
            #drawer-overlay {
                display: none;
            }

            #sidebar-floating-toggle {
                bottom: auto;
                top: 100px;
                left: 20px;
                transform: none;
                width: auto;
                max-width: none;
                display: flex;
            }

            #sidebar-floating-toggle.hidden-desktop {
                opacity: 0;
                pointer-events: none;
                visibility: hidden;
            }
        }

        /* UNIFIED DRAWER CONTAINER */
        #unified-drawer {
            position: fixed;
            background: rgba(25, 25, 30, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Inter', sans-serif;
            color: white;
            z-index: 50;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* DESKTOP LAYOUT (≥768px) - Closable */
        @media (min-width: 768px) {
            #unified-drawer {
                left: 20px;
                top: 100px;
                width: 340px;
                max-height: calc(100vh - 100px);
                border-radius: 16px;
                transform: translateX(-400px);
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            #unified-drawer.active {
                transform: translateX(0);
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }
        }

        /* TABLET/MOBILE LAYOUT (<768px) - Bottom Sheet */
        @media (max-width: 767px) {
            #unified-drawer {
                bottom: 0;
                left: 0;
                right: 0;
                width: 100%;
                height: 75vh;
                max-height: 75vh;
                border-radius: 24px 24px 0 0;
                transform: translateY(100%);
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            #unified-drawer.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
                pointer-events: auto;
            }

            #unified-drawer.collapsed {
                transform: translateY(100%);
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }
        }

        .drawer-header {
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .drawer-header h2 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .drawer-close-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 24px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            min-height: 44px;
        }

        .drawer-close-btn:hover {
            color: white;
        }

        /* DESKTOP: Close button visible */
        @media (min-width: 768px) {
            .drawer-close-btn {
                display: flex;
            }
        }

        /* MOBILE: Show close button */
        @media (max-width: 767px) {
            .drawer-close-btn {
                display: flex;
            }
        }

        /* TAB SYSTEM */
        .drawer-tabs {
            display: flex;
            gap: 0;
            background: rgba(0, 0, 0, 0.1);
            padding: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .drawer-tab-btn {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            position: relative;
            border-bottom: 2px solid transparent;
        }

        .drawer-tab-btn:hover {
            color: white;
        }

        .drawer-tab-btn.active {
            color: #38bdf8;
            border-bottom-color: #4facfe;
        }

        /* TAB CONTENT */
        .drawer-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
        }

        .drawer-content::-webkit-scrollbar {
            width: 6px;
        }

        .drawer-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* FILTER STYLES */
        .filter-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select,
        .filter-group input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
            outline: none;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.2);
        }

        .filter-group select option {
            background: #191928;
            color: white;
        }

        .active-filters {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .active-filters h4 {
            margin: 0 0 8px 0;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.2) 0%, rgba(0, 242, 254, 0.2) 100%);
            border: 1px solid rgba(79, 172, 254, 0.4);
            color: #38bdf8;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-right: 6px;
            margin-bottom: 6px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .filter-badge-remove {
            cursor: pointer;
            font-weight: bold;
            transition: color 0.2s;
        }

        .filter-badge-remove:hover {
            color: white;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .filter-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
            min-height: 44px;
        }

        #apply-filters {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: black;
        }

        #apply-filters:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        #reset-filters {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #reset-filters:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* SIDEBAR/APC LIST STYLES */
        .apc-item {
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 44px;
        }

        .apc-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .apc-item.hidden {
            display: none;
        }

        .apc-item-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .apc-item-details {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .apc-item-name {
            font-weight: 500;
            font-size: 0.9rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .apc-item-details {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #filter-count {
            text-align: center;
            padding: 12px;
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #38bdf8;
            font-weight: 600;
            display: none;
            margin-bottom: 12px;
        }

        #filter-count.show {
            display: block;
        }

        /* RESPONSIVE ADJUSTMENTS */
        @media (max-width: 600px) {
            .main-title-container {
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                align-items: center;
                gap: 4px;
                width: max-content;
            }

            .main-title {
                font-size: 1.5rem;
            }

            .main-subtitle {
                font-size: 0.7rem;
            }

            #popup {
                width: 90%;
                max-width: 350px;
            }

            .card-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .card-title {
                font-size: 1.2rem;
            }

            #zoom-controls {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                bottom: 80px;
                width: auto;
                font-size: 12px;
                padding: 8px 16px;
            }

            #search-container {
                top: 70px;
                width: 90%;
                max-width: none;
            }

            #search-input {
                font-size: 12px;
            }

            .drawer-content {
                padding: 12px;
            }

            .filter-group select,
            .filter-group input {
                font-size: 14px;
                padding: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="main-title-container">
        <h1 class="main-title">BOSS</h1>
        <span class="main-subtitle">Global ACP Map</span>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Type APC's Name, City or Country..." autocomplete="off" />
        <button id="search-btn">Search</button>
        <div id="search-dropdown"></div>
    </div>

    <div id="zoom-controls">
        <button id="zoom-out" class="zoom-btn">−</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in" class="zoom-btn">+</button>
        <button id="zoom-reset">Reset</button>
    </div>

    <!-- UNIFIED DRAWER CONTROL BUTTON (Mobile Only) -->
    <button id="sidebar-floating-toggle">☰ Filters & APCs</button>

    <!-- DRAWER OVERLAY (Mobile Only) -->
    <div id="drawer-overlay"></div>

    <!-- UNIFIED DRAWER PANEL (Desktop Always Visible, Mobile Bottom Sheet) -->
    <div id="unified-drawer">
        <div class="drawer-header">
            <h2 id="drawer-title">Filters & APCs</h2>
            <button class="drawer-close-btn" id="drawer-close-btn">&times;</button>
        </div>

        <!-- TAB NAVIGATION -->
        <div class="drawer-tabs">
            <button class="drawer-tab-btn active" data-tab="filters">🔍 Filters</button>
            <button class="drawer-tab-btn" data-tab="apcs">APCs List</button>
        </div>

        <!-- DRAWER CONTENT -->
        <div class="drawer-content">

            <!-- FILTERS TAB -->
            <div class="tab-pane active" id="filters-tab">
                <div id="filter-count"></div>

                <div class="active-filters" id="active-filters-container" style="display: none;">
                    <h4>Active Filters</h4>
                    <div id="active-filters-list"></div>
                </div>

                <div class="filter-group">
                    <label for="filter-qualification">Qualification</label>
                    <select id="filter-qualification">
                        <option value="">All Qualifications</option>
                        <option value="B.S. Computer Science">B.S. Computer Science</option>
                        <option value="M.S. Data Science">M.S. Data Science</option>
                        <option value="Ph.D. Artificial Intelligence">Ph.D. Artificial Intelligence</option>
                        <option value="B.A. Graphic Design">B.A. Graphic Design</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-profession">Profession</label>
                    <select id="filter-profession">
                        <option value="">All Professions</option>
                        <option value="Software Engineer">Software Engineer</option>
                        <option value="Data Analyst">Data Analyst</option>
                        <option value="AI Researcher">AI Researcher</option>
                        <option value="UI/UX Lead">UI/UX Lead</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filter-city">City</label>
                    <input type="text" id="filter-city" placeholder="Search city..." autocomplete="off" />
                </div>

                <div class="filter-group">
                    <label for="filter-country">Country</label>
                    <select id="filter-country">
                        <option value="">All Countries</option>
                        <option value="USA">USA</option>
                        <option value="India">India</option>
                        <option value="UK">UK</option>
                    </select>
                </div>

                <div class="filter-buttons">
                    <button class="filter-btn" id="apply-filters">Apply</button>
                    <button class="filter-btn" id="reset-filters">Reset</button>
                </div>
            </div>

            <!-- APC LIST TAB -->
            <div class="tab-pane" id="apcs-tab">
                <div id="apc-list-empty" style="display: none; text-align: center; padding: 40px 20px;">
                    <div
                        style="font-size: 1.1rem; color: rgba(255,255,255,0.7); margin-bottom: 20px; font-weight: 500;">
                        No APC(s) found</div>
                    <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
                        <button class="filter-btn" id="empty-reset-btn"
                            style="flex: none; padding: 10px 20px; margin: 0; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);color:#fff">Reset
                            Filter</button>
                        <button class="filter-btn" id="empty-modify-btn"
                            style="flex: none; padding: 10px 20px; margin: 0; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: black; border: none;">Modify
                            Filter</button>
                    </div>
                </div>
                <div id="apc-list">
                    <!-- Dynamic APC items go here -->
                </div>
            </div>

        </div>
    </div>

    <div id="globe"></div>

    <div id="popup">
        <div class="card-close" onclick="closePopup()">&times;</div>
        <div class="card-content">
            <div class="card-image-container">
                <img id="popup-image" class="card-image"
                    src="https://images.unsplash.com/photo-1599566150163-29194dcaad36?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
                    alt="Profile" />
            </div>
            <div class="card-details">
                <h3 id="title" class="card-title"></h3>
                <h4 id="subtitle" class="card-subtitle"></h4>
                <div class="card-body">
                    <p id="desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Morbi tristique neque eget.
                    </p>
                    <ul class="card-info-list">
                        <li><span class="card-info-label">Qualification</span> <span id="qualification"
                                class="card-info-value"></span></li>
                        <li><span class="card-info-label">Profession</span> <span id="profession"
                                class="card-info-value"></span></li>
                        <li><span class="card-info-label">Email</span> <span id="email" class="card-info-value"></span>
                        </li>
                        <li><span class="card-info-label">Contact</span> <span id="contact"
                                class="card-info-value"></span></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const locations = [
            {
                lat: 37.0902,
                lng: -95.7129,
                title: "John Doe",
                city: "New York City",
                country: "USA",
                description: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Aliquam id.",
                qualification: "B.S. Computer Science",
                profession: "Software Engineer",
                email: "john.doe@example.com",
                contact: "+1 234 567 8900",
                image: "https://images.unsplash.com/photo-1599566150163-29194dcaad36?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
            },
            {
                lat: 40.7128,
                lng: -74.0060,
                title: "Jane Smith",
                city: "Los Angeles",
                country: "USA",
                description: "Donec ac elit vehicula, dictum neque ut, pellentesque mi odio.",
                qualification: "M.S. Data Science",
                profession: "Data Analyst",
                email: "jane.smith@example.com",
                contact: "+1 987 654 3210",
                image: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
            },
            {
                lat: 20.5937,
                lng: 78.9629,
                title: "Ravi Patel",
                city: "Mumbai",
                country: "India",
                description: "Expert in AI and Machine Learning systems.",
                qualification: "Ph.D. Artificial Intelligence",
                profession: "AI Researcher",
                email: "ravi.patel@example.com",
                contact: "+91 98765 43210",
                image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
            },
            {
                lat: 51.5074,
                lng: -0.1278,
                title: "Emma Watson",
                city: "London",
                country: "UK",
                description: "Specializes in modern responsive web architectures.",
                qualification: "B.A. Graphic Design",
                profession: "UI/UX Lead",
                email: "emma.watson@example.com",
                contact: "+44 20 7946 0958",
                image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
            },
            {
                lat: 28.6139,
                lng: 77.2090,
                title: "Rajesh Patil",
                city: "Kolhapur",
                country: "India",
                description: "Expert in AI and Machine Learning systems.",
                qualification: "Ph.D. Artificial Intelligence",
                profession: "AI Researcher",
                email: "rajesh.patil@example.com",
                contact: "+91 98765 43210",
                image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
            },
            {
                lat: 18.5204,
                lng: 73.8567,
                title: "Rohit Kohli",
                city: "Pune",
                country: "India",
                description: "Expert in AI and Machine Learning systems.",
                qualification: "Ph.D. Artificial Intelligence",
                profession: "AI Researcher",
                email: "rohit.kohli@example.com",
                contact: "+91 98765 43210",
                image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
            },
            {
                lat: 15.2854,
                lng: 74.1245,
                title: "Sanika Patil",
                city: "Belgaum",
                country: "India",
                description: "Expert in AI and Machine Learning systems.",
                qualification: "Ph.D. Artificial Intelligence",
                profession: "AI Researcher",
                email: "sanika.patil@example.com",
                contact: "+91 98765 43210",
                image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=150&q=80"
            }
        ];

        let filteredData = [...locations];
        let currentFilters = {
            qualification: '',
            profession: '',
            city: '',
            country: ''
        };

        const isMobile = window.innerWidth < 768;
        const defaultAltitude = isMobile ? 3.5 : 2.5;

        // ============================================
        // GLOBE INITIALIZATION
        // ============================================

        const globe = Globe()(document.getElementById('globe'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .htmlElementsData(locations)
            .htmlElement(d => {
                const el = document.createElement('div');
                el.className = 'pin';
                el.dataset.index = locations.indexOf(d);

                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    displayPopup(d);
                    globe.pointOfView(
                        { lat: d.lat, lng: d.lng, altitude: 1.2 },
                        800
                    );
                });

                return el;
            })
            .htmlLat(d => d.lat)
            .htmlLng(d => d.lng)
            .htmlAltitude(0.01);

        globe.pointOfView({ altitude: defaultAltitude }, 0);

        const controls = globe.controls();
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        controls.addEventListener('change', () => {
            const currentAlt = globe.pointOfView().altitude;
            let zoomPercent = Math.round((defaultAltitude / currentAlt) * 100);

            if (zoomPercent < 10) zoomPercent = 10;
            if (zoomPercent > 1000) zoomPercent = 1000;

            document.getElementById('zoom-level').innerText = zoomPercent + "%";
        });

        document.getElementById('zoom-in').addEventListener('click', () => {
            const currentAlt = globe.pointOfView().altitude;
            globe.pointOfView({ altitude: currentAlt * 0.5 }, 500);
        });

        document.getElementById('zoom-out').addEventListener('click', () => {
            const currentAlt = globe.pointOfView().altitude;
            globe.pointOfView({ altitude: currentAlt * 1.5 }, 500);
        });

        document.getElementById('zoom-reset').addEventListener('click', () => {
            closePopup();
            globe.pointOfView({ altitude: defaultAltitude, lat: 37.09, lng: -95.72 }, 1000); // usa lat long
            controls.autoRotate = true;
        });

        controls.addEventListener('start', () => {
            controls.autoRotate = false;
        });

        function closePopup() {
            document.getElementById('popup').classList.remove('show');
        }

        function displayPopup(d) {
            document.getElementById('title').innerText = d.title;
            document.getElementById('subtitle').innerText = d.city;
            document.getElementById('desc').innerText = d.description;
            document.getElementById('qualification').innerText = d.qualification;
            document.getElementById('profession').innerText = d.profession;
            document.getElementById('email').innerText = d.email;
            document.getElementById('contact').innerText = d.contact;
            document.getElementById('popup-image').src = d.image;
            document.getElementById('popup').classList.add('show');
        }

        setTimeout(() => {
            controls.autoRotate = false;
        }, 5000);

        // ============================================
        // DRAWER SYSTEM
        // ============================================

        const drawer = document.getElementById('unified-drawer');
        const overlay = document.getElementById('drawer-overlay');
        const toggleBtn = document.getElementById('sidebar-floating-toggle');
        const closeBtn = document.getElementById('drawer-close-btn');
        const tabBtns = document.querySelectorAll('.drawer-tab-btn');
        const tabPanes = document.querySelectorAll('.tab-pane');

        toggleBtn.addEventListener('click', () => {
            drawer.classList.add('active');
            if (window.innerWidth < 768) {
                overlay.classList.add('active');
            } else {
                toggleBtn.classList.add('hidden-desktop');
            }
        });

        function closeDrawer() {
            drawer.classList.remove('active');
            overlay.classList.remove('active');
            if (window.innerWidth >= 768) toggleBtn.classList.remove('hidden-desktop');
        }

        closeBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);

        // Initial state for desktop default open
        if (window.innerWidth >= 768) {
            drawer.classList.add('active');
            toggleBtn.classList.add('hidden-desktop');
        }

        // TAB SWITCHING
        function switchTab(tabName) {
            tabBtns.forEach(b => b.classList.remove('active'));
            tabPanes.forEach(p => p.classList.remove('active'));
            const btn = document.querySelector(`.drawer-tab-btn[data-tab="${tabName}"]`);
            if (btn) btn.classList.add('active');
            const pane = document.getElementById(tabName + '-tab');
            if (pane) pane.classList.add('active');
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                switchTab(btn.dataset.tab);
            });
        });

        // ============================================
        // FILTER SYSTEM
        // ============================================

        function applyFilters() {
            currentFilters.qualification = document.getElementById('filter-qualification').value;
            currentFilters.profession = document.getElementById('filter-profession').value;
            currentFilters.city = document.getElementById('filter-city').value.toLowerCase();
            currentFilters.country = document.getElementById('filter-country').value;

            filteredData = locations.filter(d => {
                let matches = true;

                if (currentFilters.qualification && d.qualification !== currentFilters.qualification) {
                    matches = false;
                }
                if (currentFilters.profession && d.profession !== currentFilters.profession) {
                    matches = false;
                }
                if (currentFilters.city && !d.city.toLowerCase().includes(currentFilters.city)) {
                    matches = false;
                }
                if (currentFilters.country && d.country !== currentFilters.country) {
                    matches = false;
                }

                return matches;
            });

            updateUI();
            displayActiveFilters();

            if (filteredData.length > 0) {
                switchTab('apcs');
            }
        }

        function resetFilters() {
            document.getElementById('filter-qualification').value = '';
            document.getElementById('filter-profession').value = '';
            document.getElementById('filter-city').value = '';
            document.getElementById('filter-country').value = '';

            currentFilters = {
                qualification: '',
                profession: '',
                city: '',
                country: ''
            };

            filteredData = [...locations];
            updateUI();
            displayActiveFilters();
        }

        function updateUI() {
            // Update Globe Pins
            const pins = document.querySelectorAll('.pin');
            pins.forEach(pin => {
                const location = locations[pin.dataset.index];
                if (location) pin.classList.toggle('hidden', !filteredData.includes(location));
            });

            // Update Sidebar
            const apcItems = document.querySelectorAll('.apc-item');
            apcItems.forEach(item => {
                const location = locations[item.dataset.index];
                if (location) item.classList.toggle('hidden', !filteredData.includes(location));
            });

            updateResultCount();
        }

        function updateResultCount() {
            const count = filteredData.length;
            const total = locations.length;
            const countEl = document.getElementById('filter-count');
            countEl.innerText = `Showing ${count} of ${total} results`;
            countEl.classList.toggle('show', count < total);

            const apcTabBtn = document.querySelector('.drawer-tab-btn[data-tab="apcs"]');
            if (apcTabBtn) {
                apcTabBtn.innerText = `APCs List (${count}/${total})`;
            }

            const emptyState = document.getElementById('apc-list-empty');
            const listState = document.getElementById('apc-list');
            if (emptyState && listState) {
                if (count === 0) {
                    emptyState.style.display = 'block';
                    listState.style.display = 'none';
                } else {
                    emptyState.style.display = 'none';
                    listState.style.display = 'block';
                }
            }
        }

        function displayActiveFilters() {
            const container = document.getElementById('active-filters-list');
            const filterContainer = document.getElementById('active-filters-container');
            container.innerHTML = '';

            let hasActiveFilters = false;

            if (currentFilters.qualification) {
                container.innerHTML += `<div class="filter-badge">${currentFilters.qualification} <span class="filter-badge-remove" onclick="clearFilterField('qualification')">×</span></div>`;
                hasActiveFilters = true;
            }
            if (currentFilters.profession) {
                container.innerHTML += `<div class="filter-badge">${currentFilters.profession} <span class="filter-badge-remove" onclick="clearFilterField('profession')">×</span></div>`;
                hasActiveFilters = true;
            }
            if (currentFilters.city) {
                container.innerHTML += `<div class="filter-badge">${currentFilters.city} <span class="filter-badge-remove" onclick="clearFilterField('city')">×</span></div>`;
                hasActiveFilters = true;
            }
            if (currentFilters.country) {
                container.innerHTML += `<div class="filter-badge">${currentFilters.country} <span class="filter-badge-remove" onclick="clearFilterField('country')">×</span></div>`;
                hasActiveFilters = true;
            }

            filterContainer.style.display = hasActiveFilters ? 'block' : 'none';
        }

        function clearFilterField(field) {
            document.getElementById(`filter-${field}`).value = '';
            applyFilters();
        }

        document.getElementById('apply-filters').addEventListener('click', applyFilters);
        document.getElementById('reset-filters').addEventListener('click', resetFilters);

        document.getElementById('filter-city').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') applyFilters();
        });

        document.getElementById('empty-reset-btn').addEventListener('click', resetFilters);
        document.getElementById('empty-modify-btn').addEventListener('click', () => switchTab('filters'));

        // ============================================
        // APC LIST
        // ============================================

        const apcListEl = document.getElementById('apc-list');
        locations.forEach((d, index) => {
            const item = document.createElement('div');
            item.className = 'apc-item';
            item.dataset.index = index;
            item.innerHTML = `
                <img class="apc-item-img" src="${d.image}" alt="${d.title}" />
                <div class="apc-item-details">
                    <span class="apc-item-name">${d.title}</span>
                    <span class="apc-item-details">${d.profession} | ${d.city}, ${d.country}</span>
                    <span class="apc-item-details">${d.qualification}</span>
                </div>
            `;
            item.addEventListener('click', () => {
                controls.autoRotate = false;
                globe.pointOfView({ lat: d.lat, lng: d.lng, altitude: 1.2 }, 1000);

                setTimeout(() => {
                    displayPopup(d);
                }, 1100);

                // Close drawer on mobile after selection
                if (isMobile) {
                    drawer.classList.remove('active');
                    overlay.classList.remove('active');
                }
            });
            apcListEl.appendChild(item);
        });

        // ============================================
        // SEARCH LOGIC
        // ============================================

        function executeSearch() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            if (!query) return;

            closePopup();

            const countryMatches = locations.filter(d => d.country && d.country.toLowerCase() === query);

            if (countryMatches.length > 0) {
                if (countryMatches.length === 1) {
                    const match = countryMatches[0];
                    controls.autoRotate = false;
                    globe.pointOfView({ lat: match.lat, lng: match.lng, altitude: 1.2 }, 1500);

                    setTimeout(() => {
                        displayPopup(match);
                    }, 1600);
                } else {
                    const avgLat = countryMatches.reduce((sum, d) => sum + d.lat, 0) / countryMatches.length;
                    const avgLng = countryMatches.reduce((sum, d) => sum + d.lng, 0) / countryMatches.length;
                    controls.autoRotate = false;
                    globe.pointOfView({ lat: avgLat, lng: avgLng, altitude: 2.0 }, 1500);
                }
                return;
            }

            const match = locations.find(d =>
                (d.title && d.title.toLowerCase().includes(query)) ||
                (d.city && d.city.toLowerCase().includes(query)) ||
                (d.description && d.description.toLowerCase().includes(query))
            );

            if (match) {
                controls.autoRotate = false;
                globe.pointOfView({ lat: match.lat, lng: match.lng, altitude: 1.2 }, 1500);

                setTimeout(() => {
                    displayPopup(match);
                }, 1600);
            } else {
                alert("No locations found matching: " + query);
            }
        }

        const searchDropdown = document.getElementById('search-dropdown');
        const searchInput = document.getElementById('search-input');

        document.getElementById('search-btn').addEventListener('click', () => {
            searchDropdown.style.display = 'none';
            executeSearch();
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchDropdown.style.display = 'none';
                executeSearch();
            }
        });

        function debounce(func, wait) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        const handleInput = debounce((e) => {
            const query = e.target.value.toLowerCase().trim();
            if (!query) {
                searchDropdown.style.display = 'none';
                return;
            }

            const matchedCountries = [...new Set(locations
                .filter(d => d.country && d.country.toLowerCase().includes(query))
                .map(d => d.country)
            )];

            const matchedIndividuals = locations.filter(d =>
                (d.title && d.title.toLowerCase().includes(query)) ||
                (d.city && d.city.toLowerCase().includes(query)) ||
                (d.description && d.description.toLowerCase().includes(query))
            );

            searchDropdown.innerHTML = '';
            let hasResults = false;

            matchedCountries.forEach(c => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerHTML = `<strong>📍 Country: ${c}</strong>`;
                div.onclick = () => {
                    searchInput.value = c;
                    searchDropdown.style.display = 'none';
                    executeSearch();
                };
                searchDropdown.appendChild(div);
                hasResults = true;
            });

            matchedIndividuals.forEach(m => {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerHTML = `👤 ${m.title} <span style="font-size: 0.8em; color: #aaa;">(${m.city})</span>`;
                div.onclick = () => {
                    searchInput.value = m.title;
                    searchDropdown.style.display = 'none';
                    executeSearch();
                };
                searchDropdown.appendChild(div);
                hasResults = true;
            });

            if (hasResults) {
                searchDropdown.style.display = 'flex';
            } else {
                const div = document.createElement('div');
                div.className = 'dropdown-item';
                div.innerText = 'No results found';
                searchDropdown.appendChild(div);
                searchDropdown.style.display = 'flex';
            }
        }, 300);

        searchInput.addEventListener('input', handleInput);

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#search-container')) {
                searchDropdown.style.display = 'none';
            }
        });
    </script>
</body>

</html>
